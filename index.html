<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>PuzzleMaster</title>
  <meta name="description" content="类雷顿教授风格解谜游戏，100+ 原创谜题" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* Layton parchment palette */
      --bg-primary:   #f5f0e8;
      --bg-surface:   #faf8f0;
      --bg-card:      #fffef9;
      --bg-card-alt:  #f0ead8;
      --text-primary: #3d2b1f;
      --text-muted:   #8c7b6a;
      --accent:       #b85c3a;
      --accent-glow:  rgba(184, 92, 58, 0.15);
      --gold:         #c8a84e;
      --gold-dim:     #a08840;
      --ink:          #2c1810;
      --ink-light:    #5c4030;
      --parchment-border: #d4c5a0;
      --radius:       8px;
      --font:         'Noto Sans SC', system-ui, -apple-system, sans-serif;
      --font-serif:   Georgia, 'Noto Serif SC', serif;
      --shadow-card:  0 2px 12px rgba(0,0,0,0.08);
      --shadow-lg:    0 8px 32px rgba(60,30,10,0.12);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg-primary);
      /* Parchment texture via CSS noise */
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      color: var(--text-primary);
      font-family: var(--font);
      overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100%;
      padding: 24px 16px 40px;
    }

    /* ─── Title ─── */
    .game-title {
      font-size: 2rem;
      font-weight: 700;
      font-family: var(--font-serif);
      letter-spacing: 0.1em;
      color: var(--ink);
      margin-bottom: 4px;
      text-align: center;
      text-shadow: 0 1px 2px rgba(139,109,82,0.15);
    }
    .game-title em {
      font-style: italic;
      color: var(--gold-dim);
    }

    .game-subtitle {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 28px;
      letter-spacing: 0.4em;
      text-align: center;
      font-family: var(--font-serif);
    }

    /* ─── Home Screen ─── */
    #home-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 420px;
    }

    .brain-score-home {
      font-size: 1.15rem;
      font-weight: 600;
      font-family: var(--font-serif);
      color: var(--ink);
      background: var(--bg-card);
      padding: 14px 28px;
      border-radius: var(--radius);
      border: 1px solid var(--parchment-border);
      box-shadow: var(--shadow-card);
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      justify-content: center;
    }
    .brain-score-home .score-num {
      color: var(--gold-dim);
      font-size: 1.4rem;
    }

    .home-buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
    }

    button {
      padding: 14px 20px;
      border: 1px solid var(--parchment-border);
      border-radius: var(--radius);
      background: var(--bg-card);
      color: var(--ink);
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      width: 100%;
      box-shadow: var(--shadow-card);
    }

    button:hover {
      background: var(--bg-card-alt);
      border-color: var(--gold);
      transform: translateY(-1px);
      box-shadow: var(--shadow-lg);
    }

    button:active {
      transform: translateY(0) !important;
    }

    /* ─── Story Mode button (primary CTA) ─── */
    #story-mode-btn {
      background: linear-gradient(135deg, #c8a84e, #b8953a);
      border: 1px solid #a08840;
      color: #fffef5;
      font-size: 1.1rem;
      font-family: var(--font-serif);
      padding: 18px 24px;
      box-shadow: 0 4px 16px rgba(160,136,64,0.25);
    }

    #story-mode-btn:hover {
      filter: brightness(1.08);
      box-shadow: 0 6px 20px rgba(160,136,64,0.35);
    }

    /* ─── Puzzle type pills ─── */
    .type-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .type-pill {
      font-size: 0.7rem;
      color: var(--text-muted);
      background: var(--bg-card);
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid var(--parchment-border);
      font-family: var(--font-serif);
    }

    /* ─── Game layout ─── */
    #game-container {
      display: none;
      position: relative;
      border-radius: var(--radius);
      width: 100%;
      max-width: 560px;
      background: var(--bg-card);
      border: 1px solid var(--parchment-border);
      box-shadow: var(--shadow-lg);
    }

    #game-canvas {
      display: block;
      background: var(--bg-surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
    }

    #step-count {
      display: none;
      font-size: 0.9rem;
      color: var(--text-muted);
      padding: 6px 14px;
      background: var(--bg-card);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
      margin-top: 12px;
    }

    #story-progress {
      display: none;
      font-size: 0.85rem;
      color: var(--ink);
      padding: 6px 16px;
      background: var(--bg-card);
      border-radius: 20px;
      border: 1px solid var(--parchment-border);
      margin-bottom: 12px;
      font-weight: 600;
      font-family: var(--font-serif);
    }

    #home-btn {
      display: none;
      margin-top: 16px;
      background: var(--bg-card);
      border: 1px solid var(--parchment-border);
      color: var(--text-muted);
      max-width: 200px;
    }

    #home-btn:hover {
      border-color: var(--gold);
      color: var(--ink);
    }

    /* ─── Win overlay ─── */
    #win-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(245,240,232,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    #win-overlay.visible { display: flex; }

    #win-overlay h2 {
      font-size: 1.8rem;
      font-family: var(--font-serif);
      color: var(--ink);
    }

    #win-overlay p {
      font-size: 1rem;
      color: var(--text-muted);
      font-family: var(--font-serif);
    }

    #win-overlay button {
      width: 160px;
      margin-top: 8px;
      background: linear-gradient(135deg, #c8a84e, #b8953a);
      border: 1px solid #a08840;
      color: #fffef5;
      font-family: var(--font-serif);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="game-title">PuzzleMaster</div>
    <div class="game-subtitle">谜 题 大 师</div>

    <div id="home-screen">
      <div class="brain-score-home">
        🧠 Brain Score: <span id="score-display">0</span>
      </div>
      <div class="home-buttons">
        <button id="story-mode-btn" type="button">📖 Story Mode · 开始挑战</button>
        <button id="hybrid-demo-btn" type="button" style="background: linear-gradient(135deg, #3498db, #2980b9); color: white; border-color: #2980b9;">🤖 AI 生成状态转移</button>
      </div>
      <div class="type-pills">
        <span class="type-pill">✏️ 一笔画</span>
        <span class="type-pill">🔢 数字网格</span>
        <span class="type-pill">🧩 拼图挑战</span>
        <span class="type-pill">🧩 滑块拼图</span>
        <span class="type-pill">🔍 逻辑网格</span>
        <span class="type-pill">📐 数学推理</span>
        <span class="type-pill">🔥 火柴棒</span>
        <span class="type-pill">⚖️ 天平称重</span>
        <span class="type-pill">🚣 过河问题</span>
        <span class="type-pill">🧠 侧向思维</span>
        <span class="type-pill">💬 文字游戏</span>
      </div>
    </div>

    <span id="story-progress">第 0 题</span>
    <div id="game-container"></div>
    <span id="step-count">步数: 0</span>
    <button id="home-btn" type="button">← 返回首页</button>
  </div>

  <!-- Win overlay -->
  <div id="win-overlay">
    <h2 id="win-title">🎉 恭喜通关!</h2>
    <p id="win-message">用了 0 步完成</p>
    <button id="win-next-btn" type="button">下一局</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
