<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>PuzzleMaster — 华容道</title>
  <meta name="description" content="经典华容道解谜游戏，程序化生成无限关卡" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ─── Root tokens ───────────────────────────────────── */
    :root {
      --bg-primary:   #0b0b1a;
      --bg-surface:   #13132b;
      --bg-card:      #1a1a3e;
      --text-primary: #e8e8f0;
      --text-muted:   #8888aa;
      --accent:       #ff6b6b;
      --accent-glow:  rgba(255, 107, 107, 0.25);
      --gold:         #ffd700;
      --radius:       12px;
      --font:         'Noto Sans SC', system-ui, -apple-system, sans-serif;
    }

    /* ─── Page layout ───────────────────────────────────── */
    html, body {
      width: 100%; height: 100%;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font);
      overflow: hidden;
      touch-action: none;             /* prevent pull-to-refresh */
    }

    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 20px;
      padding: 16px;
    }

    /* ─── Title ──────────────────────────────────────────── */
    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, var(--accent), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px var(--accent-glow);
    }

    /* ─── Canvas wrapper ─────────────────────────────────── */
    #game-container {
      position: relative;
      border-radius: var(--radius);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 8px 32px rgba(0,0,0,0.5),
        0 0 60px var(--accent-glow);
      overflow: hidden;
    }

    #game-canvas {
      display: block;
      background: var(--bg-surface);
      border-radius: var(--radius);
    }

    /* ─── Controls ───────────────────────────────────────── */
    #controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 380px;
    }

    #info {
      display: flex;
      justify-content: space-between;
      width: 100%;
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    #info span {
      padding: 6px 14px;
      background: var(--bg-card);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    #buttons {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    select, button {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      background: var(--bg-card);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-appearance: none;
      appearance: none;
      text-align: center;
    }

    select:hover, button:hover {
      background: rgba(255,255,255,0.08);
      border-color: var(--accent);
    }

    button#new-game-btn {
      background: linear-gradient(135deg, var(--accent), #e05555);
      border-color: transparent;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }

    button#new-game-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    button#new-game-btn:active {
      transform: translateY(0);
    }

    /* ─── Win overlay ────────────────────────────────────── */
    #win-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    #win-overlay.visible { display: flex; }

    #win-overlay h2 {
      font-size: 2rem;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(255,215,0,0.4);
    }

    #win-overlay p {
      font-size: 1.1rem;
      color: var(--text-muted);
    }

    #win-overlay button {
      width: 160px;
      margin-top: 8px;
    }

    /* ─── Loading ─────────────────────────────────────────── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--bg-card);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <h1>华 容 道</h1>

    <div id="game-container">
      <canvas id="game-canvas"></canvas>
    </div>

    <div id="controls">
      <div id="info">
        <span id="step-count">步数: 0</span>
        <span id="difficulty-display">难度: 简单</span>
      </div>
      <div id="buttons">
        <select id="difficulty-select" aria-label="选择难度">
          <option value="2">简单</option>
          <option value="5">中等</option>
          <option value="8">困难</option>
        </select>
        <button id="new-game-btn" type="button">新游戏</button>
      </div>
    </div>
  </div>

  <!-- Win overlay -->
  <div id="win-overlay">
    <h2>🎉 恭喜通关!</h2>
    <p id="win-message">用了 0 步完成</p>
    <button id="win-next-btn" type="button">下一局</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
